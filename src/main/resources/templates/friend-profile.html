<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンドプロフィール | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1>フレンドプロフィール</h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">プロフィール</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>
<main class="app-shell friends-shell"
      th:attr="data-friend-user-id=${friend.id},data-friend-username=${friend.username},data-can-send-request=${canSendRequest}">
    <section class="schedule-pane friend-section">
        <div class="dm-chat-header">
            <h2 th:text="${friend.displayName + ' (@' + friend.username + ')'}"></h2>
            <button id="sendFriendRequestButton" type="button" class="secondary friend-profile-dm-button"
                    th:if="${canSendRequest}">フレンド申請</button>
        </div>
        <img class="profile-image friend-profile-image"
             th:src="@{'/api/users/' + ${friend.id} + '/profile-image'}"
             onerror="this.onerror=null;this.src='/img/default-profile.svg';"
             alt="プロフィールアイコン">
        <p id="friendProfileMessage" class="form-message" aria-live="polite"></p>
        <p th:if="${isSelf}">あなた自身のプロフィールです。</p>
        <p th:if="${!isSelf and isFriend}">このユーザーはフレンドです。</p>
        <p th:if="${!isSelf and !isFriend and !canSendRequest}">すでにフレンド申請済み、または関係が存在します。</p>
        <p th:text="${friend.profileBio != null && !friend.profileBio.isBlank() ? friend.profileBio : '自己紹介は未設定です。'}"></p>
        <p>
            <strong>配信URL:</strong>
            <a th:if="${friend.streamUrl != null && !friend.streamUrl.isBlank()}"
               th:href="${friend.streamUrl}"
               th:text="${friend.streamUrl}"
               target="_blank"
               rel="noopener noreferrer"></a>
            <span th:if="${friend.streamUrl == null || friend.streamUrl.isBlank()}">未設定</span>
        </p>
        <p>
            <strong>X URL:</strong>
            <a th:if="${friend.xUrl != null && !friend.xUrl.isBlank()}"
               th:href="${friend.xUrl}"
               th:text="${friend.xUrl}"
               target="_blank"
               rel="noopener noreferrer"></a>
            <span th:if="${friend.xUrl == null || friend.xUrl.isBlank()}">未設定</span>
        </p>
        <p><a href="/friends">フレンド一覧に戻る</a></p>
    </section>
</main>
<script src="/js/theme.js"></script>
<script src="/js/game-badges.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/friend-profile.js"></script>
</body>
</html>
