<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>期限リマインダー</title>
</head>
<body style="margin:0;padding:16px;background:#f4f7fb;font-family:Arial,'Hiragino Sans','Yu Gothic',sans-serif;color:#1f2d3d;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #dde6f1;border-radius:10px;">
    <tr>
        <td style="padding:20px 24px;">
            <h2 style="margin:0 0 12px;font-size:22px;color:#1e5aac;">期限リマインダー</h2>
            <p style="margin:0 0 8px;" th:text="${displayName} + ' さん'">ユーザー名 さん</p>
            <p style="margin:0 0 16px;" th:text="${dueDate} + ' の予定をお知らせします。'">2026-05-01 の予定をお知らせします。</p>

            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-collapse:collapse;">
                <thead>
                <tr>
                    <th align="left" style="padding:8px;border-bottom:1px solid #d8e2ef;background:#f7faff;">タイトル</th>
                    <th align="left" style="padding:8px;border-bottom:1px solid #d8e2ef;background:#f7faff;">時間</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td style="padding:8px;border-bottom:1px solid #edf2f8;" th:text="${item.title}">予定タイトル</td>
                    <td style="padding:8px;border-bottom:1px solid #edf2f8;"
                        th:text="${item.startTime != null ? item.startTime : '時刻未設定'}">09:00</td>
                </tr>
                </tbody>
            </table>

            <p style="margin:16px 0 0;color:#6b7c93;font-size:12px;">このメールは Schedule Manager から自動送信されています。</p>
        </td>
    </tr>
</table>
</body>
</html>
