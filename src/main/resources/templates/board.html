<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>募集掲示板 | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'の募集掲示板'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">プロフィール</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell vivid-shell"
      th:attr="data-current-username=${currentUsername},data-current-display-name=${currentDisplayName},data-search-keyword=${keyword}">
    <section class="schedule-pane">
        <header>
            <h2>ゲーム募集掲示板</h2>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-cyan">BOARD</span>
                <span class="profile-chip profile-chip-pink">RECRUIT</span>
            </div>
        </header>

        <section class="friend-section board-entry-section">
            <h3>進みたい項目を選択</h3>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-violet">MENU</span>
            </div>
            <div class="board-entry-cards">
                <a id="openCreateThreadCard" href="/board/create" class="board-entry-card">
                    <span class="board-entry-title">スレッド作成</span>
                    <span class="board-entry-text">新しいゲーム募集スレッドを作る</span>
                </a>
                <button id="openThreadListCard" type="button" class="board-entry-card">
                    <span class="board-entry-title">スレッド一覧</span>
                    <span class="board-entry-text">既存スレッドを検索して開く</span>
                </button>
            </div>
        </section>
        <p id="boardMessage" class="form-message" aria-live="polite"></p>

        <section id="threadListSection" class="friend-section" hidden>
            <h3>ゲーム一覧</h3>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-cyan">LIST</span>
                <span class="profile-chip profile-chip-violet">SEARCH</span>
            </div>
            <form method="get" action="/board" class="inline-form" style="margin-bottom:10px;">
                <input id="threadSearchKeyword" type="text" name="keyword" placeholder="タイトルで検索" list="threadSearchSuggestions" autocomplete="off" th:value="${keyword}">
                <datalist id="threadSearchSuggestions"></datalist>
                <button type="submit" class="secondary">検索</button>
                <a href="/board" class="secondary auth-link-button" style="width:auto;min-width:84px;margin-top:0;">クリア</a>
            </form>
            <p class="help-text" th:text="'検索結果: ' + ${threadSearchResultCount} + '件'"></p>
            <div id="gameCardList" class="board-game-cards"></div>
        </section>

        <section id="postEditorSection" class="friend-section" hidden>
            <h3 id="selectedThreadLabel">ゲームを選択してください</h3>
            <ul id="postSummaryList" class="mini-list"></ul>
        </section>

        <section id="postListSection" class="friend-section" hidden>
            <h3>投稿詳細</h3>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-pink">DETAIL</span>
            </div>
            <div id="postDetailEmpty" class="help-text">投稿を選択すると詳細が表示されます。</div>
            <div id="postDetailPanel" hidden>
                <p id="postDetailMeta" class="help-text"></p>
                <p id="postDetailBody"></p>
                <div id="postOwnerActions" class="form-actions" hidden>
                    <button id="postEditButton" type="button" class="secondary">編集</button>
                    <button id="postDeleteButton" type="button" class="secondary">削除</button>
                </div>
                <form id="postEditForm" class="schedule-form" hidden>
                    <label for="editPostBody">募集内容</label>
                    <textarea id="editPostBody" rows="4" maxlength="1000" required></textarea>

                    <label for="editPostScheduleDate">予定日（任意）</label>
                    <input id="editPostScheduleDate" type="date">

                    <label for="editPostStartTime">開始時刻（任意）</label>
                    <input id="editPostStartTime" type="time">

                    <label for="editPostRankBand">ランク（任意）</label>
                    <input id="editPostRankBand" type="text" maxlength="100" placeholder="例: ダイヤ4 / プラチナ帯">

                    <label for="editPostRecruitmentLimit">募集人数（任意）</label>
                    <input id="editPostRecruitmentLimit" type="number" min="1" step="1" placeholder="例: 2">

                    <div class="form-actions">
                        <button id="postUpdateButton" type="submit" class="primary">更新</button>
                        <button id="postEditCancelButton" type="button" class="secondary">キャンセル</button>
                    </div>
                </form>
                <form id="joinRequestForm" class="schedule-form">
                    <label for="joinRequestComment">参加希望コメント</label>
                    <textarea id="joinRequestComment" rows="3" maxlength="500" placeholder="例: 参加希望です。21:00から入れます。" required></textarea>
                    <div class="form-actions">
                        <button id="joinRequestSubmitButton" type="submit" class="primary">参加希望を送信</button>
                    </div>
                </form>
                <section id="boardPendingJoinSection" hidden>
                    <h4>参加希望（承認待ち）</h4>
                    <ul id="boardPendingJoinList" class="mini-list"></ul>
                </section>
                <section>
                    <h4>参加メンバー</h4>
                    <ul id="boardParticipantList" class="mini-list"></ul>
                </section>
                <section id="boardDiscordSection" hidden>
                    <h4>Discord</h4>
                    <p><a id="boardDiscordInviteLink" href="#" target="_blank" rel="noopener noreferrer">Discord招待リンクを開く</a></p>
                </section>
                <form id="boardDiscordOwnerForm" class="schedule-form" hidden>
                    <label for="boardDiscordInviteUrl">Discord招待URL（承認メンバー向け）</label>
                    <input id="boardDiscordInviteUrl" type="url" maxlength="1000" placeholder="https://discord.gg/xxxx">
                    <div class="form-actions">
                        <button id="boardDiscordSaveButton" type="submit" class="secondary">Discord URLを保存</button>
                    </div>
                </form>
            </div>
        </section>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/board.js"></script>
</body>
</html>
