<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Schedule Manager</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
<main class="app-shell auth-shell">
    <section class="calendar-pane auth-card">
        <h1>Schedule Manager</h1>
        <h2>ログイン</h2>

        <p class="success-text" th:if="${registered}">登録が完了しました。ログインしてください。</p>
        <p class="success-text" th:if="${loggedOut}">ログアウトしました。</p>
        <p class="form-message" th:if="${loginError}">ユーザー名またはパスワードが正しくありません。</p>

        <form method="post" action="/login" class="schedule-form">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" required>

            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" required>

            <button type="submit" class="primary">ログイン</button>
        </form>
    </section>

    <section class="schedule-pane auth-card">
        <h2>新規登録</h2>
        <p class="help-text">登録後、同じユーザー名とパスワードでログインできます。</p>
        <p class="form-message" th:if="${registerError}" th:text="${registerError}"></p>

        <form method="post" action="/register" class="schedule-form">
            <label for="registerUsername">ユーザー名（英数字/アンダースコア 4〜30文字）</label>
            <input id="registerUsername" name="username" type="text" minlength="4" maxlength="30" required>

            <label for="registerDisplayName">表示名</label>
            <input id="registerDisplayName" name="displayName" type="text" maxlength="100" required>

            <label for="registerPassword">パスワード（8〜72文字）</label>
            <input id="registerPassword" name="password" type="password" minlength="8" maxlength="72" required>

            <button type="submit" class="primary">登録する</button>
        </form>
    </section>
</main>
</body>
</html>
