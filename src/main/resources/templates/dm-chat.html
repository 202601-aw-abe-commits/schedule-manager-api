<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMチャット | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'のDM'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">プロフィール</a>
        <a href="/dm" data-nav-badge="dm" data-nav-label="✉ DM">✉ DM</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell"
      th:attr="data-current-username=${currentUsername},data-conversation-id=${conversationId}">
    <section class="schedule-pane">
        <header class="dm-chat-header">
            <a href="/dm" class="secondary auth-link-button">← DM一覧へ</a>
            <h2 id="dmChatTitle" th:text="${partnerDisplayName + ' (@' + partnerUsername + ')'}">DM</h2>
        </header>

        <section class="friend-section dm-chat-section">
            <ul id="dmMessageThread" class="dm-message-thread"></ul>
        </section>

        <section class="friend-section">
            <form id="dmSendForm" class="schedule-form">
                <label for="dmBodyInput">メッセージ</label>
                <div class="dm-input-toolbar">
                    <label for="dmAttachmentFile" class="dm-attach-button" title="画像/動画を添付" aria-label="画像/動画を添付">📎</label>
                    <input id="dmAttachmentFile" type="file" accept="image/*,video/mp4,video/webm,video/quicktime" hidden>
                </div>
                <textarea id="dmBodyInput" rows="3" maxlength="1000" placeholder="メッセージを入力"></textarea>
                <div class="form-actions">
                    <button type="submit" class="primary">送信</button>
                </div>
            </form>
            <p id="dmMessage" class="form-message" aria-live="polite"></p>
        </section>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/dm-chat.js"></script>
</body>
</html>
