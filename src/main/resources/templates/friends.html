<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレンド | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'のフレンド'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">プロフィール</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell vivid-shell" th:attr="data-current-username=${currentUsername},data-current-display-name=${currentDisplayName}">
    <section class="schedule-pane">
        <header>
            <h2>フレンド管理</h2>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-cyan">FRIEND</span>
                <span class="profile-chip profile-chip-violet">SOCIAL</span>
            </div>
        </header>

        <section class="friend-section">
            <h3>メニュー</h3>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-pink">MENU</span>
            </div>
            <div class="board-entry-cards">
                <a href="/friends/search" class="board-entry-card">
                    <span class="board-entry-title">フレンド検索</span>
                    <span class="board-entry-text">ユーザー名で検索して申請を送る</span>
                </a>
                <a href="/friends/list" class="board-entry-card">
                    <span class="board-entry-title">フレンド一覧</span>
                    <span class="board-entry-text">現在のフレンドを確認・通知設定</span>
                </a>
                <a href="/friends/requests" class="board-entry-card">
                    <span class="board-entry-title">フレンド申請</span>
                    <span class="board-entry-text">受信申請の承認と送信中申請の確認</span>
                </a>
            </div>
        </section>

        <section class="friend-section">
            <h3>フレンドレベルランキング</h3>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-orange">RANKING</span>
            </div>
            <div class="ranking-tabs" role="tablist" aria-label="ランキング期間">
                <button type="button" class="ranking-tab active" data-period="week">週間</button>
                <button type="button" class="ranking-tab" data-period="month">月間</button>
                <button type="button" class="ranking-tab" data-period="all">全期間</button>
            </div>
            <ul id="levelRankingList" class="mini-list ranking-list"></ul>
        </section>

    </section>
</main>
<script src="/js/theme.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/friends-home.js"></script>
</body>
</html>
