<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'のDM'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">プロフィール</a>
        <a href="/dm" data-nav-badge="dm" data-nav-label="✉ DM">✉ DM</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell vivid-shell"
      th:attr="data-current-username=${currentUsername},data-current-display-name=${currentDisplayName}">
    <section class="schedule-pane">
        <header>
            <h2>ダイレクトメッセージ</h2>
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-cyan">DM</span>
                <span class="profile-chip profile-chip-pink">CHAT</span>
            </div>
        </header>

        <section class="friend-section dm-search-section">
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-violet">SEARCH</span>
            </div>
            <form id="dmSearchForm" class="inline-form">
                <input id="dmSearchInput" type="text" placeholder="🔍 ユーザー名で検索" maxlength="120">
                <button type="submit" class="secondary">検索</button>
            </form>
        </section>

        <section class="friend-section">
            <div class="top-page-badge-row">
                <span class="profile-chip profile-chip-orange">INBOX</span>
            </div>
            <ul id="dmConversationCards" class="dm-conversation-cards"></ul>
            <p id="dmMessage" class="form-message" aria-live="polite"></p>
        </section>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/dm-list.js"></script>
</body>
</html>
